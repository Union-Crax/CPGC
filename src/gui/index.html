<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPGC — Compressor</title>
<style>
  :root { --bg:#1e1f24; --panel:#272932; --line:#3a3d49; --fg:#e6e8ee;
          --muted:#9aa0ad; --accent:#4f8cff; --good:#3fbf6f; --bad:#ff6b6b; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .tag { color:var(--muted); font-size:12px; }
  .bar { display:flex; align-items:center; gap:8px; padding:8px 16px;
         background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:0; border-radius:6px;
           padding:7px 12px; cursor:pointer; font-size:13px; }
  button.ghost { background:#363a47; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  input, select { background:#1b1c21; color:var(--fg); border:1px solid var(--line);
                  border-radius:6px; padding:6px 8px; font-size:13px; }
  .path { color:var(--muted); font-size:12px; padding:6px 16px; word-break:break-all; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:7px 16px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:500; font-size:12px; position:sticky; top:0;
       background:var(--bg); }
  tbody tr:hover { background:#2b2e38; }
  td.name { cursor:default; }
  td.name.clickable { cursor:pointer; color:var(--fg); }
  td.name.clickable:hover { color:var(--accent); }
  .icon { display:inline-block; width:18px; }
  .size { color:var(--muted); text-align:right; font-variant-numeric:tabular-nums; }
  .wrap { max-height:calc(100vh - 230px); overflow:auto; }
  #log { padding:10px 16px; font:12px/1.5 ui-monospace,Menlo,monospace;
         border-top:1px solid var(--line); background:var(--panel);
         white-space:pre-wrap; min-height:60px; }
  .ok { color:var(--good); } .er { color:var(--bad); }
  .pill { background:#363a47; border-radius:999px; padding:2px 8px; font-size:11px;
          color:var(--muted); }
  label { color:var(--muted); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>📦 CPGC</h1>
  <span class="tag">context-mixing compressor — local GUI</span>
</header>

<div class="bar">
  <button class="ghost" id="up">⬆ Up</button>
  <span class="pill" id="selcount">0 selected</span>
  <span style="flex:1"></span>
  <label>Output</label>
  <input id="outname" placeholder="archive.cpgc" size="20">
  <label>Level</label>
  <select id="level">
    <option value="1">1 (fast)</option>
    <option value="5" selected>5 (default)</option>
    <option value="9">9 (max)</option>
  </select>
  <button id="compress" disabled>Compress →</button>
</div>

<div class="path" id="cwd">/</div>

<div class="wrap">
  <table>
    <thead><tr>
      <th style="width:34px"></th><th>Name</th>
      <th style="width:120px" class="size">Size</th>
      <th style="width:90px">Type</th>
      <th style="width:160px">Action</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<div id="log">Ready. Tick files/folders to compress, or use “Extract” on a .cpgc/.cpas archive.</div>

<script>
let cwd = "";
let parent = null;
const sel = new Set();

const $ = s => document.querySelector(s);
const fmt = n => n>=1e9?(n/1e9).toFixed(2)+" GB":n>=1e6?(n/1e6).toFixed(2)+" MB":
                 n>=1e3?(n/1e3).toFixed(1)+" KB":n+" B";

function log(msg, cls){ const l=$("#log"); l.innerHTML = `<span class="${cls||''}">${msg}</span>`; }

async function ls(path){
  sel.clear(); updateSel();
  const r = await fetch("/api/ls?path="+encodeURIComponent(path||""));
  const d = await r.json();
  cwd = d.path; parent = d.parent;
  $("#cwd").textContent = cwd;
  $("#up").disabled = !parent;
  const rows = $("#rows"); rows.innerHTML = "";
  for(const e of d.entries){
    const tr = document.createElement("tr");
    const full = cwd.replace(/\/$/,"") + "/" + e.name;
    const cb = e.dir ? "" :
      `<input type="checkbox" data-p="${encodeURIComponent(full)}">`;
    const icon = e.dir ? "📁" : e.archive ? "🗜️" : "📄";
    const type = e.dir ? "folder" : e.archive ? "archive" : "file";
    const action = e.dir
      ? ""
      : e.archive
        ? `<button class="ghost" data-arc="${encodeURIComponent(full)}">Extract</button>
           <button class="ghost" data-info="${encodeURIComponent(full)}">Info</button>`
        : "";
    tr.innerHTML =
      `<td>${cb}</td>`+
      `<td class="name ${e.dir?'clickable':''}" ${e.dir?`data-dir="${encodeURIComponent(full)}"`:''}>`+
        `<span class="icon">${icon}</span>${e.name}</td>`+
      `<td class="size">${e.dir?"":fmt(e.size)}</td>`+
      `<td><span class="pill">${type}</span></td>`+
      `<td>${action}</td>`;
    rows.appendChild(tr);
  }
  bind();
}

function bind(){
  document.querySelectorAll("[data-dir]").forEach(el=>
    el.onclick=()=>ls(decodeURIComponent(el.dataset.dir)));
  document.querySelectorAll("#rows input[type=checkbox]").forEach(cb=>
    cb.onchange=()=>{ const p=decodeURIComponent(cb.dataset.p);
      cb.checked?sel.add(p):sel.delete(p); updateSel(); });
  document.querySelectorAll("[data-arc]").forEach(b=>
    b.onclick=()=>extract(decodeURIComponent(b.dataset.arc)));
  document.querySelectorAll("[data-info]").forEach(b=>
    b.onclick=()=>info(decodeURIComponent(b.dataset.info)));
}

function updateSel(){
  $("#selcount").textContent = sel.size+" selected";
  $("#compress").disabled = sel.size===0;
  if(sel.size===1 && !$("#outname").value){
    const only = [...sel][0].split("/").pop();
    $("#outname").placeholder = only + ".cpgc";
  }
}

$("#up").onclick = ()=>{ if(parent!==null) ls(parent); };

$("#compress").onclick = async ()=>{
  let out = $("#outname").value.trim();
  if(!out){ out = (sel.size===1?[...sel][0].split("/").pop():"archive") + ".cpgc"; }
  if(!/\.(cpgc|cpas)$/i.test(out)) out += ".cpgc";
  const output = cwd.replace(/\/$/,"") + "/" + out;
  log("Compressing "+sel.size+" item(s)…");
  $("#compress").disabled = true;
  const body = new URLSearchParams({
    inputs:[...sel].join("\n"), output, level:$("#level").value });
  try{
    const r = await fetch("/api/compress",{method:"POST",body});
    const d = await r.json();
    if(d.ok){
      const pct = (100*d.compressed/d.original).toFixed(1);
      log(`✔ ${out} — ${fmt(d.original)} → ${fmt(d.compressed)} `+
          `(${pct}% of original, ${d.files} file(s))`, "ok");
      ls(cwd);
    } else log("✘ "+d.error, "er");
  }catch(e){ log("✘ "+e, "er"); }
  $("#compress").disabled = false;
};

async function extract(arc){
  const base = arc.split("/").pop().replace(/\.(cpgc|cpas)$/i,"");
  const dest = cwd.replace(/\/$/,"") + "/" + base + "_extracted";
  log("Extracting "+arc.split("/").pop()+" → "+base+"_extracted/ …");
  const body = new URLSearchParams({archive:arc, dest});
  try{
    const r = await fetch("/api/extract",{method:"POST",body});
    const d = await r.json();
    if(d.ok){ log(`✔ extracted ${d.files} file(s) to ${d.dest}`, "ok"); ls(cwd); }
    else log("✘ "+d.error, "er");
  }catch(e){ log("✘ "+e, "er"); }
}

async function info(arc){
  const r = await fetch("/api/info?path="+encodeURIComponent(arc));
  const d = await r.json();
  if(!d.ok){ log("✘ "+d.error, "er"); return; }
  if(d.kind==="solid"){
    const list = d.files.map(f=>`   ${fmt(f.size).padStart(10)}  ${f.name}`).join("\n");
    log(`🗜️ solid archive — ${d.files.length} file(s), ${fmt(d.compressed)} packed\n`+list);
  } else {
    log(`🗜️ single file — ${fmt(d.original)} → ${fmt(d.compressed)} `+
        `(ratio ${d.ratio.toFixed(4)})`);
  }
}

ls("");
</script>
</body>
</html>
